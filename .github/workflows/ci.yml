name: CI

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install backend deps
        working-directory: backend
        run: npm ci

      - name: Syntax check backend
        run: |
          node --check backend/src/index.js
          find backend/src/middleware -name '*.js' -print0 | xargs -0 -n1 node --check
          node --check backend/src/routes/capture.js
          find backend/src/services -name '*.js' -print0 | xargs -0 -n1 node --check

      - name: Security policy regression checks
        run: node scripts/check-security.mjs

      - name: Syntax check extension + frontend script
        run: |
          node --check extension/background.js
          node --check extension/popup.js
          TMPFILE=$(mktemp /tmp/tabvault-frontend-XXXXXX.js)
          sed -n '/<script>/,/<\/script>/p' frontend/index.html | sed '1d;$d' > "$TMPFILE"
          node --check "$TMPFILE"
